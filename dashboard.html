<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SkillXP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            display: block;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-section {
            margin-top: 3rem;
        }

        .progress-item {
            margin-bottom: 2rem;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="logo">SkillXP</a>
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Courses</a>
            <a href="dashboard.html">Dashboard</a>
            <span class="xp-badge total-xp">0 XP</span>
        </div>
    </nav>

    <div class="container">
        <h1>Your Learning Progress</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value total-xp">0 XP</span>
                <span class="stat-label">Total Experience</span>
            </div>
            <div class="stat-card">
                <span id="levels-completed" class="stat-value">0</span>
                <span class="stat-label">Levels Completed</span>
            </div>
            <div class="stat-card">
                <span id="courses-started" class="stat-value">0</span>
                <span class="stat-label">Courses Started</span>
            </div>
        </div>

        <div class="progress-section-card">
            <div class="progress-section-header">
                <h2>Course Progress Breakdown</h2>
            </div>

            <div class="progress-list">
                <!-- HTML Progress Item -->
                <div class="progress-item" id="html-progress-item">
                    <div class="progress-info">
                        <div class="course-meta">
                            <div class="course-icon html-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="m18 16 4-4-4-4"></path>
                                    <path d="m6 8-4 4 4 4"></path>
                                    <path d="m14.5 4-5 16"></path>
                                </svg>
                            </div>
                            <div>
                                <span class="course-name">HTML Fundamentals</span>
                                <span class="completion-badge">Completed</span>
                            </div>
                        </div>
                        <span id="html-progress-text" class="progress-percentage">0%</span>
                    </div>
                    <div class="progress-track">
                        <div id="html-progress-bar" class="progress-fill html-fill"></div>
                    </div>
                </div>

                <!-- CSS Progress Item -->
                <div class="progress-item" id="css-progress-item">
                    <div class="progress-info">
                        <div class="course-meta">
                            <div class="course-icon css-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"></path>
                                    <path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"></path>
                                    <path d="M12 2v2"></path>
                                    <path d="M12 20v2"></path>
                                    <path d="m4.93 4.93 1.41 1.41"></path>
                                    <path d="m17.66 17.66 1.41 1.41"></path>
                                    <path d="M2 12h2"></path>
                                    <path d="M20 12h2"></path>
                                    <path d="m6.34 17.66-1.41 1.41"></path>
                                    <path d="m19.07 4.93-1.41 1.41"></path>
                                </svg>
                            </div>
                            <div>
                                <span class="course-name">CSS Styling</span>
                                <span class="completion-badge">Completed</span>
                            </div>
                        </div>
                        <span id="css-progress-text" class="progress-percentage">0%</span>
                    </div>
                    <div class="progress-track">
                        <div id="css-progress-bar" class="progress-fill css-fill"></div>
                    </div>
                </div>
            </div>
        </div>

        <div style="margin-top: 2rem; text-align: center;">
            <button class="btn" onclick="resetProgress()" style="background: var(--text-muted);">Reset All
                Progress</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function updateDashboard() {
            const data = getUserData();

            // Total levels completed
            const totalLevels = data.courses.html.completedLevels.length + data.courses.css.completedLevels.length;
            document.getElementById('levels-completed').textContent = totalLevels;

            // Courses started (progress > 0)
            let started = 0;
            if (data.courses.html.progress > 0) started++;
            if (data.courses.css.progress > 0) started++;
            document.getElementById('courses-started').textContent = started;
        }

        function resetProgress() {
            if (confirm("Are you sure you want to reset all your progress? This cannot be undone!")) {
                localStorage.removeItem('skillxp_user_data');
                location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', updateDashboard);
    </script>
</body>

</html>
