<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SkillXP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">
    <nav>
        <a href="index.html" class="logo">SkillXP</a>
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links">
            <a href="login.html">Login</a>
            <a href="signup.html" class="btn primary" style="padding: 0.5rem 1rem;">Register</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Log in to continue your progress.</p>
            </div>

            <div id="error-box" class="error-message" style="display: none;"></div>
            <div id="success-box" class="error-message"
                style="display: none; background: #dcfce7; color: #166534; border-color: #166534;">
                Registration successful! Please log in.
            </div>

            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Log In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check for success message from signup
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('registered')) {
            document.getElementById('success-box').style.display = 'block';
        }

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');

            if (loginUser(email, password)) {
                window.location.href = 'index.html';
            } else {
                errorBox.textContent = "Invalid email or password!";
                errorBox.style.display = "block";
                document.getElementById('success-box').style.display = 'none';
            }
        });
    </script>
</body>

</html>
